<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrylist XMT – Formulaire</title>
  <link rel="icon" type="image/png" href="xmt-logo.png" />
  <style>
    :root {
      --bg: #0b0b0f;
      --card: #14141b;
      --text: #f4f4f7;
      --muted: #b8b8c6;
      --accent: #6b006e;
      --accent-2: #920080;
      --accent-3: #c0005a;
      --hot: #962972;
      --border: rgba(255, 255, 255, 0.1);
      --success: #8cffb1;
      --error: #ffb3b3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { user-select: none; -webkit-user-select: none; }
    img { pointer-events: none; -webkit-user-drag: none; user-drag: none; }
    input, textarea { user-select: text; -webkit-user-select: text; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        linear-gradient(90deg, rgba(3,4,8,0.82), rgba(8,8,14,0.42) 44%, rgba(4,5,9,0.88)),
        linear-gradient(180deg, rgba(0,0,0,0.42), rgba(0,0,0,0.72)),
        url("xmt-gt3-showroom.png") center center / cover fixed no-repeat,
        #07070c;
      color: var(--text);
      isolation: isolate;
    }

    body::before, body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    body::before {
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 58px 58px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent 82%);
      animation: gridDrift 18s linear infinite;
    }

    body::after {
      background:
        linear-gradient(115deg, transparent 0 36%, rgba(255,255,255,0.1) 37%, transparent 39% 100%),
        linear-gradient(115deg, transparent 0 64%, rgba(150,41,114,0.12) 65%, transparent 67% 100%);
      transform: translateX(-18%);
      animation: speedLines 7s ease-in-out infinite;
    }

    .showroom-bg {
      position: fixed;
      inset: -4%;
      z-index: -3;
      pointer-events: none;
      background: url("xmt-gt3-showroom.png") center center / cover no-repeat;
      filter: saturate(1.08) contrast(1.05);
      animation: showroomMove 18s ease-in-out infinite alternate;
    }

    .race-scene {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: min(28vh, 220px);
      pointer-events: none;
      overflow: hidden;
      z-index: 10;
    }

    .race-scene::before {
      content: "";
      position: absolute;
      left: -5%; right: -5%; bottom: 38px;
      height: 72px;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.22) 0 56px, transparent 56px 116px),
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.01));
      border-top: 1px solid rgba(150,41,114,0.3);
      border-bottom: 1px solid rgba(107,0,110,0.25);
      transform: perspective(360px) rotateX(58deg);
      transform-origin: bottom center;
      animation: roadRush 1.1s linear infinite;
    }

    .race-scene::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 98px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(150,41,114,0.85), transparent);
      box-shadow: 0 0 18px rgba(150,41,114,0.5);
      animation: horizonPulse 2.4s ease-in-out infinite;
    }

    .race-car {
      position: absolute;
      left: -250px; bottom: 62px;
      width: 250px; height: 92px;
      filter: drop-shadow(0 0 20px rgba(150,41,114,0.7));
      animation: carLap 7s cubic-bezier(.45,.02,.35,1) infinite;
    }

    .race-car::after {
      content: "";
      position: absolute;
      left: -110px; bottom: 30px;
      width: 120px; height: 12px;
      background: rgba(150,41,114,0.4);
      filter: blur(3px);
      border-radius: 999px;
    }

    .wheel-anim {
      animation: wheelSpin 0.42s linear infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    /* ── Layout ── */
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 64px 20px 80px;
      position: relative;
    }

    .card {
      position: relative;
      overflow: hidden;
      background: rgba(14,12,22,0.93);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 24px;
      padding: 34px;
      box-shadow:
        0 28px 80px rgba(0,0,0,0.48),
        0 0 44px rgba(193,59,198,0.18),
        inset 0 1px 0 rgba(255,255,255,0.13);
      backdrop-filter: blur(18px);
      animation: panelIn 0.8s cubic-bezier(.2,.8,.2,1) both;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      background: linear-gradient(120deg, transparent 0 32%, rgba(255,255,255,0.16) 45%, transparent 58% 100%);
      opacity: 0.75;
      transform: translateX(-45%);
      animation: cardShine 5.5s ease-in-out infinite;
      pointer-events: none;
    }

    .card::after {
      content: "XMT";
      position: absolute;
      right: -18px; bottom: -30px;
      color: rgba(255,255,255,0.035);
      font-size: 8.5rem;
      font-weight: 900;
      letter-spacing: 6px;
      pointer-events: none;
    }

    .card > * { position: relative; z-index: 1; }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4vw, 3rem);
      text-transform: uppercase;
      color: #fff;
      animation: titleGlow 3s ease-in-out infinite;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    /* ── Form ── */
    form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    form > div { animation: fieldIn 0.65s ease both; }
    form > div:nth-child(1) { animation-delay: 0.08s; }
    form > div:nth-child(2) { animation-delay: 0.16s; }
    form > div:nth-child(3) { animation-delay: 0.24s; }
    form > div:nth-child(4) { animation-delay: 0.32s; }
    form > div:nth-child(5) { animation-delay: 0.40s; }

    label {
      display: block;
      font-size: 0.88rem;
      margin-bottom: 6px;
      color: #f1e9ff;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.13);
      background: rgba(8,8,15,0.7);
      color: var(--text);
      font-size: 1rem;
      min-height: 48px;
      transition: border-color 0.22s, box-shadow 0.22s, transform 0.22s, background 0.22s;
    }

    input:focus {
      outline: none;
      border-color: rgba(192,0,74,0.82);
      background: rgba(12,13,24,0.88);
      box-shadow: 0 0 0 3px rgba(192,0,74,0.14), 0 0 24px rgba(193,59,198,0.28);
      transform: translateY(-1px);
    }

    /* ── Platform selector ── */
    .platform-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .platform-option { position: relative; }

    .platform-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0; height: 0;
    }

    .platform-card {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      padding: 14px 10px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(8,8,15,0.7);
      cursor: pointer;
      transition: border-color 0.22s, background 0.22s, box-shadow 0.22s, transform 0.22s;
      user-select: none;
      min-height: 90px;
    }

    .platform-card:hover {
      border-color: rgba(255,255,255,0.28);
      background: rgba(20,20,30,0.85);
      transform: translateY(-2px);
    }

    .platform-card svg {
      width: 28px;
      height: 28px;
      fill: rgba(255,255,255,0.45);
      transition: fill 0.22s;
      flex-shrink: 0;
    }

    .platform-option input[type="radio"]:checked + .platform-card {
      border-color: rgba(192,0,74,0.9);
      background: rgba(12,13,24,0.92);
      box-shadow: 0 0 0 3px rgba(192,0,74,0.14), 0 0 20px rgba(193,59,198,0.28);
    }

    .platform-option input[type="radio"]:checked + .platform-card svg {
      fill: #fff;
    }

    /* PSN checked = blue tint */
    #psn:checked + .platform-card { border-color: rgba(0,120,255,0.9); box-shadow: 0 0 0 3px rgba(0,120,255,0.18), 0 0 20px rgba(0,80,200,0.22); }
    /* XBOX checked = green tint */
    #xbox:checked + .platform-card { border-color: rgba(16,150,16,0.9); box-shadow: 0 0 0 3px rgba(16,150,16,0.18), 0 0 20px rgba(16,120,16,0.22); }

    .platform-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
      transition: color 0.22s;
      letter-spacing: 1px;
    }

    .platform-option input[type="radio"]:checked + .platform-card .platform-label {
      color: #fff;
    }

    /* ── Field hints ── */
    .field-hint {
      font-size: 0.78rem;
      margin-top: 4px;
      display: none;
    }
    .field-hint.error { color: var(--error); display: block; }
    .field-hint.success { color: var(--success); display: block; }

    /* ── Actions ── */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 22px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: #962972;
      color: #fff;
      font-weight: bold;
      font-size: 0.95rem;
      text-decoration: none;
      cursor: pointer;
      min-height: 48px;
      box-shadow: 0 10px 28px rgba(150,41,114,0.32);
      transition: transform 0.22s, box-shadow 0.22s, filter 0.22s;
    }

    .btn:hover { filter: brightness(1.15); transform: translateY(-2px); box-shadow: 0 16px 38px rgba(150,41,114,0.42); }
    .btn:disabled { cursor: wait; opacity: 0.7; transform: none; }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #e7e7f2;
      box-shadow: none;
      animation: none;
    }

    .status {
      margin-top: 8px;
      font-size: 0.9rem;
      color: var(--muted);
      min-height: 20px;
    }
    .status.success { color: var(--success); }
    .status.error { color: var(--error); }

    /* ── Animations ── */
    @keyframes gridDrift { from { background-position: 0 0, 0 0; } to { background-position: 58px 58px, 58px 58px; } }
    @keyframes speedLines { 0%,100% { opacity:.18; transform:translateX(-20%); } 50% { opacity:.46; transform:translateX(10%); } }
    @keyframes panelIn { from { opacity:0; transform:translateY(22px) scale(.98); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes cardShine { 0%,58%,100% { transform:translateX(-48%); opacity:.45; } 72% { transform:translateX(40%); opacity:.9; } }
    @keyframes titleGlow { 0%,100% { filter:drop-shadow(0 0 8px rgba(168,0,53,.2)); } 50% { filter:drop-shadow(0 0 18px rgba(192,0,74,.32)); } }
    @keyframes fieldIn { from { transform:translateY(10px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    @keyframes buttonFlow { 0%,100% { background-position:0% 50%; } 50% { background-position:100% 50%; } }
    @keyframes showroomMove { from { transform:scale(1.02) translate3d(-1.2%,-0.6%,0); } to { transform:scale(1.08) translate3d(1.2%,0.8%,0); } }
    @keyframes roadRush { from { background-position:0 0,0 0; } to { background-position:-116px 0,0 0; } }
    @keyframes horizonPulse { 0%,100% { opacity:.38; transform:scaleX(.9); } 50% { opacity:.9; transform:scaleX(1); } }
    @keyframes carLap {
      0% { transform:translateX(0) translateY(8px) scale(.92); opacity:0; }
      10% { opacity:1; }
      48% { transform:translateX(calc(100vw + 260px)) translateY(-5px) scale(1.05); opacity:1; }
      49% { opacity:0; }
      62% { transform:translateX(calc(100vw + 260px)) translateY(10px) scale(.82) rotateY(180deg); opacity:0; }
      72% { opacity:.75; }
      100% { transform:translateX(-260px) translateY(4px) scale(.82) rotateY(180deg); opacity:0; }
    }
    @keyframes wheelSpin { to { transform:rotate(360deg); } }

    /* ── Responsive PC ── */
    @media (max-width: 700px) {
      .container { padding: 40px 16px 80px; }
    }

    /* ── Responsive Mobile ── */
    @media (max-width: 480px) {
      .container { padding: 24px 12px 80px; }

      .card {
        padding: 20px 16px;
        border-radius: 18px;
      }

      h1 { font-size: 1.6rem; margin-bottom: 8px; }
      .subtitle { font-size: 0.88rem; margin-bottom: 18px; }

      form { gap: 12px; }

      .platform-card {
        padding: 12px 8px;
        min-height: 80px;
        gap: 6px;
      }

      .platform-card svg { width: 24px; height: 24px; }
      .platform-label { font-size: 0.78rem; }

      input { font-size: 16px; padding: 12px; } /* 16px prevents iOS zoom */

      .actions { flex-direction: column; }
      .actions .btn { width: 100%; }

      .race-scene { display: none; }
    }

    /* ══ LOGO ENTRANCE ══ */
    .logo-img { animation: logoIn 0.9s cubic-bezier(.2,1.3,.4,1) 0.2s both; }
    @keyframes logoIn {
      0%   { opacity:0; transform:scale(0.2) rotate(-20deg); filter:brightness(12) drop-shadow(0 0 40px #fff); }
      55%  { opacity:1; transform:scale(1.1) rotate(4deg);  filter:brightness(2)  drop-shadow(0 0 20px rgba(192,0,74,0.9)); }
      100% { opacity:1; transform:scale(1)   rotate(0deg);  filter:drop-shadow(0 0 10px rgba(193,59,198,0.5)); }
    }

    /* ══ FLASH OVERLAY ══ */
    #flashOverlay {
      position:fixed; inset:0; z-index:200; pointer-events:none;
      background:white;
      animation:flashFade 0.9s ease-out forwards;
    }
    @keyframes flashFade {
      0%   { opacity:0.85; }
      40%  { opacity:0.3; }
      100% { opacity:0; visibility:hidden; }
    }



    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }

    /* ══ CONFETTI ══ */
    #confettiCanvas { display:none; position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:9999; }

    /* ══ FLAG OVERLAY ══ */
    #flagOverlay {
      display:none; position:fixed; inset:0; z-index:10000; pointer-events:none;
      align-items:center; justify-content:center; flex-direction:column; gap:18px;
      background:rgba(0,0,0,0.45); backdrop-filter:blur(2px);
    }
    #flagOverlay.show { display:flex; animation:overlayIn 0.35s ease both; }
    #flagOverlay.hide { animation:overlayOut 0.6s ease both; }
    @keyframes overlayIn  { from{opacity:0} to{opacity:1} }
    @keyframes overlayOut { from{opacity:1} to{opacity:0} }
    .flag-pole { display:flex; align-items:flex-start; }
    .flag-stick { width:6px; height:160px; background:linear-gradient(180deg,#e0e0e0,#888); border-radius:3px 3px 2px 2px; flex-shrink:0; }
    .flag-cloth {
      width:130px; height:90px; margin-top:2px;
      background-image: repeating-conic-gradient(#111 0% 25%, #fff 0% 50%);
      background-size: 22px 22px;
      transform-origin:left center;
      animation:flagWave 0.45s ease-in-out infinite alternate;
      box-shadow:2px 2px 8px rgba(0,0,0,0.5);
    }
    .flag-label {
      color:#fff; font-size:2.2rem; font-weight:900; letter-spacing:6px;
      text-shadow:0 0 24px rgba(192,0,74,0.9), 0 2px 10px rgba(0,0,0,0.8);
      animation:labelPop 0.5s cubic-bezier(.2,1.4,.4,1) 0.25s both;
    }
    @keyframes flagWave {
      from { transform:perspective(200px) rotateY(-8deg) skewY(-2deg); }
      to   { transform:perspective(200px) rotateY(8deg)  skewY(2deg); }
    }
    @keyframes labelPop {
      from { transform:scale(0.4) translateY(20px); opacity:0; }
      to   { transform:scale(1) translateY(0); opacity:1; }
    }
    @keyframes successFlagWave {
      0%,100% { transform:scale(1.1) rotate(-8deg); }
      50%      { transform:scale(1.2) rotate(8deg); }
    }
    #successFlagEmoji { animation:successPop 0.6s cubic-bezier(.2,1.4,.4,1) both, successFlagWave 0.8s ease-in-out 0.7s infinite; display:inline-block; }
  </style>
</head>
<body>
  <div id="flashOverlay"></div>
  <canvas id="confettiCanvas"></canvas>
  <div id="flagOverlay">
    <div class="flag-pole">
      <div class="flag-stick"></div>
      <div class="flag-cloth"></div>
    </div>
    <div class="flag-label">ARRIVÉE !</div>
  </div>
  <div class="showroom-bg"></div>
  <div class="race-scene">
    <div class="race-car">
      <svg viewBox="0 0 250 92" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
        <ellipse cx="125" cy="86" rx="110" ry="6" fill="rgba(0,0,0,0.3)"/>
        <path d="M14 58 L22 32 Q34 11 66 9 L125 7 Q168 5 190 16 L208 28 Q220 36 222 58 Z" fill="#8a0f8f"/>
        <path d="M68 9 Q104 2 128 2 Q154 3 170 9 L165 23 Q143 15 121 15 Q97 15 78 20 Z" fill="rgba(192,0,90,0.55)"/>
        <rect x="212" y="18" width="34" height="6" rx="3" fill="#8a0f8f"/>
        <rect x="218" y="24" width="3" height="13" fill="rgba(220,220,220,0.65)"/>
        <rect x="230" y="24" width="3" height="13" fill="rgba(220,220,220,0.65)"/>
        <path d="M8 56 L32 56 L28 68 L4 68 Z" fill="rgba(138,15,143,0.8)"/>
        <circle cx="60" cy="72" r="17" fill="#080810"/>
        <circle class="wheel-anim" cx="60" cy="72" r="11" fill="#111" stroke="rgba(150,41,114,0.8)" stroke-width="2"/>
        <circle cx="60" cy="72" r="5" fill="#1a1a25"/>
        <circle cx="182" cy="72" r="19" fill="#080810"/>
        <circle class="wheel-anim" cx="182" cy="72" r="13" fill="#111" stroke="rgba(107,0,110,0.8)" stroke-width="2"/>
        <circle cx="182" cy="72" r="5" fill="#1a1a25"/>
        <ellipse cx="242" cy="48" rx="8" ry="4" fill="rgba(255,130,0,0.4)"/>
      </svg>
    </div>
  </div>

  <main class="container">
    <div class="card">
      <img src="xmt-logo.png" alt="XMT" class="logo-img" style="height:56px;width:auto;mix-blend-mode:screen;filter:drop-shadow(0 0 10px rgba(193,59,198,0.5));margin-bottom:10px;display:block;" />
      <h1>Entrylist XMT</h1>
      <p class="subtitle">
        Remplissez ce formulaire pour vous inscrire sur l'entrylist XMT et participer aux évènements du serveur.
      </p>

      <form id="entryForm" novalidate>

        <!-- Plateforme -->
        <div>
          <label>Plateforme</label>
          <div class="platform-selector">
            <div class="platform-option">
              <input type="radio" id="psn" name="platform" value="PSN" required />
              <label for="psn" class="platform-card">
                <!-- Simple Icons – PlayStation -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M8.984 2.596v17.547l3.915 1.261V6.688c0-.69.304-1.151.794-.991.636.18.76.814.76 1.505v5.875c2.441 1.193 4.362-.002 4.362-3.152 0-3.237-1.126-4.675-4.438-5.827C13.07 3.65 10.648 2.912 8.984 2.596zm4.656 16.241 6.296-2.275c.715-.258.826-.625.246-.818-.586-.192-1.637-.139-2.357.123l-4.205 1.5V14.98l.24-.085s1.201-.42 2.913-.615c1.696-.18 3.785.03 5.437.661 1.848.601 2.04 1.472 1.576 2.072-.465.6-1.622 1.036-1.622 1.036l-8.544 3.107V18.86zM1.807 18.6c-1.9-.545-2.214-1.668-1.352-2.32.801-.586 2.16-1.052 2.16-1.052l5.615-2.013v2.313L4.205 17c-.705.271-.825.632-.239.826.586.195 1.637.15 2.343-.12L8.247 17v2.074c-.12.03-.256.044-.39.073-1.939.331-3.996.196-6.038-.479z"/>
                </svg>
                <span class="platform-label">PSN</span>
              </label>
            </div>

            <div class="platform-option">
              <input type="radio" id="xbox" name="platform" value="XBOX" />
              <label for="xbox" class="platform-card">
                <!-- Simple Icons – Xbox -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M4.102 21.033C6.211 22.881 8.977 24 12 24c3.026 0 5.789-1.119 7.902-2.967 1.877-1.912-4.316-8.709-7.902-11.417-3.582 2.708-9.779 9.505-7.898 11.417zm11.16-14.406c2.5 2.961 7.484 10.313 6.076 12.912C23.002 17.48 24 14.861 24 12.004c0-3.34-1.365-6.362-3.57-8.536 0 0-.027-.022-.082-.042-.063-.022-.152-.045-.281-.045-.592 0-1.985.434-4.805 3.246zM3.654 3.426c-.057.02-.082.041-.086.042C1.365 5.642 0 8.664 0 12.004c0 2.854.998 5.473 2.661 7.533-1.401-2.605 3.579-9.951 6.08-12.91-2.82-2.813-4.216-3.245-4.806-3.245-.131 0-.223.021-.281.046v-.002zM12 3.551S9.055 1.828 6.755 1.746c-.903-.033-1.454.295-1.521.339C7.379.646 9.659 0 11.984 0H12c2.334 0 4.605.646 6.766 2.085-.068-.046-.615-.372-1.52-.339C14.946 1.828 12 3.545 12 3.545v.006z"/>
                </svg>
                <span class="platform-label">XBOX</span>
              </label>
            </div>
          </div>
          <div id="platformHint" class="field-hint"></div>
        </div>

        <!-- Pseudo -->
        <div>
          <label for="pseudo">Pseudo (Affiché en jeu)</label>
          <input id="pseudo" name="pseudo" type="text" required autocomplete="off" />
          <div id="pseudoHint" class="field-hint"></div>
        </div>

        <!-- ID -->
        <div>
          <label for="id">ID</label>
          <input id="id" name="id" type="text" required autocomplete="off" />
        </div>

        <!-- N° Pilote -->
        <div>
          <label for="numeroPilote">N° Pilote</label>
          <input id="numeroPilote" name="numeroPilote" type="number" min="1" max="999" required />
          <div id="numeroHint" class="field-hint"></div>
        </div>

        <div class="actions">
          <button type="submit" class="btn" id="submitBtn">Envoyer mon entrylist</button>
          <a href="entrylist_liste.html" class="btn btn-secondary">Voir la liste</a>
        </div>

        <div id="status" class="status" role="alert"></div>
      </form>

      <!-- Écran de confirmation (caché par défaut) -->
      <div id="successScreen" style="display:none; text-align:center; padding: 12px 0;">
        <div style="font-size:3.5rem; margin-bottom:12px;"><span id="successFlagEmoji">🏁</span></div>
        <h2 style="font-size:1.4rem; margin-bottom:8px; color:#fff;">Entrylist enregistrée !</h2>
        <p style="color:var(--muted); font-size:0.9rem; margin-bottom:6px;">Bienvenue sur la grille, <strong id="confirmedPseudo" style="color:#fff;"></strong> !</p>
        <p style="color:var(--muted); font-size:0.85rem; margin-bottom:22px;">N° Pilote : <strong id="confirmedNumero" style="color:var(--accent-3);"></strong></p>
        <a href="entrylist_liste.html" class="btn" style="display:inline-flex;">Voir la liste des pilotes</a>
      </div>
    </div>
  </main>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxTILGoua3WpneTTlu1r06tE5_aJeJvfam6XYk4rSWklXsgnNYIpr8NFui87-AObu_3cg/exec";

    const form          = document.getElementById("entryForm");
    const statusEl      = document.getElementById("status");
    const submitBtn     = document.getElementById("submitBtn");
    const pseudoHint    = document.getElementById("pseudoHint");
    const numeroHint    = document.getElementById("numeroHint");
    const platformHint  = document.getElementById("platformHint");
    const successScreen = document.getElementById("successScreen");

    let submitted = false; // bloqué en mémoire seulement (reset au refresh)

    function showSuccess(pseudo, numero, celebrate) {
      submitted = true;
      form.style.display = "none";
      document.getElementById("confirmedPseudo").textContent = pseudo;
      document.getElementById("confirmedNumero").textContent = numero;
      successScreen.style.display = "block";
      if (celebrate) { launchConfetti(); showFlagOverlay(); }
    }

    // ── Fetch list pour doublon ──
    let cachedList = null;
    let submitting = false;

    async function getList() {
      if (!cachedList) cachedList = fetchList();
      return cachedList;
    }

    async function fetchList() {
      try {
        const res = await fetch(WEB_APP_URL + "?action=list&_=" + Date.now());
        if (res.ok) return normalizeList(await res.json());
      } catch (_) {}
      return new Promise((resolve) => {
        const cb = "xmtChk_" + Date.now();
        const script = document.createElement("script");
        const timer = setTimeout(() => { delete window[cb]; script.remove(); resolve([]); }, 8000);
        window[cb] = (d) => { clearTimeout(timer); delete window[cb]; script.remove(); resolve(normalizeList(d)); };
        script.src = WEB_APP_URL + "?action=list&callback=" + cb + "&_=" + Date.now();
        document.head.appendChild(script);
      });
    }

    function normalizeList(raw) {
      if (!raw) return [];
      const rows = Array.isArray(raw.rows) ? raw.rows : Array.isArray(raw.data) ? raw.data : Array.isArray(raw) ? raw : [];
      return rows.map(r => Array.isArray(r)
        ? { pseudo: String(r[1]||"").toLowerCase(), numero: String(r[3]||"") }
        : { pseudo: String(r.pseudo||r.nom||r.pilote||"").toLowerCase(), numero: String(r.numeroPilote||r.numero||r.num||"") }
      );
    }

    // ── Hints en temps réel ──
    document.getElementById("pseudo").addEventListener("blur", async () => {
      const val = document.getElementById("pseudo").value.trim().toLowerCase();
      if (!val) return;
      try {
        const list = await getList();
        pseudoHint.textContent = list.some(r => r.pseudo === val) ? "Ce pseudo est déjà utilisé." : "Pseudo disponible ✓";
        pseudoHint.className = "field-hint " + (list.some(r => r.pseudo === val) ? "error" : "success");
      } catch (_) {}
    });

    document.getElementById("numeroPilote").addEventListener("blur", async () => {
      const val = document.getElementById("numeroPilote").value.trim();
      if (!val) return;
      try {
        const list = await getList();
        numeroHint.textContent = list.some(r => r.numero === val) ? "Ce numéro est déjà utilisé." : "Numéro disponible ✓";
        numeroHint.className = "field-hint " + (list.some(r => r.numero === val) ? "error" : "success");
      } catch (_) {}
    });

    // ── Submit ──
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (submitting || submitted) return;

      const platform     = form.querySelector('input[name="platform"]:checked');
      const pseudo       = document.getElementById("pseudo").value.trim();
      const idRaw        = document.getElementById("id").value.trim();
      const numeroPilote = document.getElementById("numeroPilote").value.trim();

      if (!platform) {
        platformHint.textContent = "Veuillez choisir une plateforme.";
        platformHint.className = "field-hint error";
        return;
      }
      platformHint.className = "field-hint";

      if (!pseudo || !idRaw || !numeroPilote) {
        statusEl.textContent = "Merci de remplir tous les champs.";
        statusEl.className = "status error";
        return;
      }

      const numVal = parseInt(numeroPilote);
      if (isNaN(numVal) || numVal < 1 || numVal > 999) {
        statusEl.textContent = "Le numéro de pilote doit être compris entre 1 et 999.";
        statusEl.className = "status error";
        document.getElementById("numeroPilote").focus();
        submitting = false; submitBtn.disabled = false;
        return;
      }

      submitting = true;
      submitBtn.disabled = true;
      statusEl.textContent = "Vérification en cours...";
      statusEl.className = "status";

      // Doublon check
      try {
        const list = await getList();
        if (list.some(r => r.pseudo === pseudo.toLowerCase())) {
          statusEl.textContent = "Ce pseudo est déjà utilisé.";
          statusEl.className = "status error";
          pseudoHint.textContent = "Ce pseudo est déjà utilisé.";
          pseudoHint.className = "field-hint error";
          submitting = false; submitBtn.disabled = false; return;
        }
        if (list.some(r => r.numero === numeroPilote)) {
          statusEl.textContent = "Ce numéro de pilote est déjà utilisé.";
          statusEl.className = "status error";
          numeroHint.textContent = "Ce numéro est déjà utilisé.";
          numeroHint.className = "field-hint error";
          submitting = false; submitBtn.disabled = false; return;
        }
      } catch (_) {}

      const idFinal = (platform.value === "PSN" ? "P" : "M") + idRaw;
      statusEl.textContent = "Envoi en cours...";

      const formData = new FormData();
      formData.append("action", "add");
      formData.append("pseudo", pseudo);
      formData.append("id", idFinal);
      formData.append("numeroPilote", numeroPilote);
      formData.append("pointsLicence", "10");

      try {
        await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: formData });

        // Afficher l'écran de succès
        showSuccess(pseudo, numeroPilote, true);

      } catch (err) {
        console.error(err);
        statusEl.textContent = "Erreur lors de l'envoi. Merci de réessayer.";
        statusEl.className = "status error";
        submitting = false;
        submitBtn.disabled = false;
      }
    });

    // ── Animated favicon ──
    (function animateFavicon() {
      const canvas = document.createElement("canvas");
      canvas.width = 32; canvas.height = 32;
      const ctx = canvas.getContext("2d");
      let tick = 0;
      const fav = document.querySelector('link[rel="icon"]') || (() => { const l = document.createElement("link"); l.rel="icon"; l.type="image/png"; document.head.appendChild(l); return l; })();
      const cols = ["#c0004a","#a80035","#8a0f8f","#a80035","#c0004a"];
      setInterval(() => {
        tick++;
        const col = cols[tick % cols.length];
        ctx.clearRect(0,0,32,32);
        ctx.fillStyle="#0b0b0f"; ctx.beginPath(); ctx.roundRect(0,0,32,32,7); ctx.fill();
        ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.beginPath(); ctx.roundRect(1.5,1.5,29,29,6); ctx.stroke();
        ctx.fillStyle="#fff"; ctx.font="bold 9px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("XMT",16,16);
        fav.href = canvas.toDataURL("image/png");
      }, 400);
    })();

    // ── Confetti ──
    function launchConfetti() {
      const canvas = document.getElementById("confettiCanvas");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      canvas.style.display = "block";
      const colors = ["#c0004a","#a80035","#920080","#ffffff","#f4f4f7","#6b006e","#ff6090","#8cffb1"];
      const pieces = Array.from({length: 140}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * -1 - 20,
        w: Math.random() * 10 + 5,
        h: Math.random() * 6 + 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        speed: Math.random() * 3 + 2,
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.18,
        swayAmp: Math.random() * 2 + 0.5,
        swayFreq: Math.random() * 0.05 + 0.02,
        tick: Math.random() * Math.PI * 2
      }));
      let startTime = null;
      const duration = 5000;
      function draw(ts) {
        if (!startTime) startTime = ts;
        const elapsed = ts - startTime;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let active = false;
        pieces.forEach(p => {
          p.tick += p.swayFreq;
          p.y += p.speed;
          p.x += Math.sin(p.tick) * p.swayAmp;
          p.angle += p.spin;
          if (p.y < canvas.height + 30) active = true;
          const alpha = elapsed > duration - 1200 ? Math.max(0, (duration - elapsed) / 1200) : 1;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
          ctx.restore();
        });
        if (active && elapsed < duration) requestAnimationFrame(draw);
        else { canvas.style.display = "none"; ctx.clearRect(0,0,canvas.width,canvas.height); }
      }
      requestAnimationFrame(draw);
    }

    // ── Flag overlay ──
    function showFlagOverlay() {
      const overlay = document.getElementById("flagOverlay");
      if (!overlay) return;
      overlay.classList.remove("hide");
      overlay.classList.add("show");
      setTimeout(() => {
        overlay.classList.add("hide");
        setTimeout(() => { overlay.classList.remove("show","hide"); }, 600);
      }, 2800);
    }
  </script>
  <style>
    @keyframes successPop {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
  </style>
</body>
</html>
