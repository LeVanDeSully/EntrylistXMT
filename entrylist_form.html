<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrylist XMT – Formulaire</title>
  <style>
    :root {
      --bg: #0b0b0f;
      --card: #14141b;
      --text: #f4f4f7;
      --muted: #b8b8c6;
      --accent: #8a0f8f;
      --accent-2: #c13bc6;
      --accent-3: #45d6ff;
      --hot: #ff3fd7;
      --border: rgba(255, 255, 255, 0.1);
      --success: #8cffb1;
      --error: #ffb3b3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 63, 215, 0.22), transparent 27%),
        radial-gradient(circle at 82% 8%, rgba(69, 214, 255, 0.2), transparent 25%),
        radial-gradient(circle at 50% 100%, rgba(138, 15, 143, 0.28), transparent 34%),
        linear-gradient(135deg, #07070c 0%, #10091a 48%, #080912 100%);
      color: var(--text);
      isolation: isolate;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    body::before {
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 58px 58px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), transparent 82%);
      animation: gridDrift 18s linear infinite;
    }

    body::after {
      background:
        linear-gradient(115deg, transparent 0 36%, rgba(255, 255, 255, 0.1) 37%, transparent 39% 100%),
        linear-gradient(115deg, transparent 0 64%, rgba(69, 214, 255, 0.12) 65%, transparent 67% 100%);
      transform: translateX(-18%);
      animation: speedLines 7s ease-in-out infinite;
    }

    .race-scene {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: min(28vh, 220px);
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .race-scene::before {
      content: "";
      position: absolute;
      left: -5%;
      right: -5%;
      bottom: 38px;
      height: 72px;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.22) 0 56px, transparent 56px 116px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01));
      border-top: 1px solid rgba(69, 214, 255, 0.28);
      border-bottom: 1px solid rgba(255, 63, 215, 0.22);
      transform: perspective(360px) rotateX(58deg);
      transform-origin: bottom center;
      filter: blur(0.2px);
      animation: roadRush 1.1s linear infinite;
    }

    .race-scene::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 98px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(69, 214, 255, 0.8), rgba(255, 63, 215, 0.7), transparent);
      box-shadow: 0 0 18px rgba(69, 214, 255, 0.45);
      animation: horizonPulse 2.4s ease-in-out infinite;
    }

    .race-car {
      position: absolute;
      left: -230px;
      bottom: 74px;
      width: 210px;
      height: 76px;
      filter: drop-shadow(0 0 18px rgba(255, 63, 215, 0.6));
      animation: carLap 7s cubic-bezier(.45, .02, .35, 1) infinite;
    }

    .race-car::before {
      content: "";
      position: absolute;
      left: 18px;
      right: 8px;
      bottom: 24px;
      height: 30px;
      background:
        linear-gradient(90deg, rgba(69, 214, 255, 0.95), rgba(255, 63, 215, 0.98) 58%, #ffffff 59% 63%, rgba(255, 63, 215, 0.95) 64%),
        linear-gradient(180deg, rgba(255,255,255,0.35), transparent);
      clip-path: polygon(0 72%, 8% 42%, 33% 36%, 45% 0, 68% 0, 82% 35%, 100% 50%, 95% 83%, 10% 88%);
      border-radius: 22px 34px 18px 18px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5), 0 0 24px rgba(69, 214, 255, 0.32);
    }

    .race-car::after {
      content: "";
      position: absolute;
      left: -120px;
      bottom: 36px;
      width: 138px;
      height: 14px;
      background: linear-gradient(90deg, transparent, rgba(69, 214, 255, 0.12), rgba(255, 63, 215, 0.8));
      filter: blur(2px);
      border-radius: 999px;
    }

    .wheel {
      position: absolute;
      bottom: 11px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background:
        radial-gradient(circle, #f8fbff 0 12%, #1b1b25 13% 36%, #050509 37% 100%);
      border: 3px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 12px rgba(69, 214, 255, 0.45);
      animation: wheelSpin 0.45s linear infinite;
    }

    .wheel.front { right: 28px; }
    .wheel.back { left: 34px; }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 64px 20px 72px;
      position: relative;
    }

    .card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(26, 24, 38, 0.92), rgba(8, 9, 16, 0.86));
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      padding: 34px;
      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.48),
        0 0 44px rgba(193, 59, 198, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.13);
      backdrop-filter: blur(18px);
      animation: panelIn 0.8s cubic-bezier(.2, .8, .2, 1) both;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      background:
        linear-gradient(120deg, transparent 0 32%, rgba(255, 255, 255, 0.22) 45%, transparent 58% 100%),
        radial-gradient(circle at top left, rgba(255, 63, 215, 0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(69, 214, 255, 0.18), transparent 34%);
      opacity: 0.75;
      transform: translateX(-45%);
      animation: cardShine 5.5s ease-in-out infinite;
      pointer-events: none;
    }

    .card::after {
      content: "XMT";
      position: absolute;
      right: -18px;
      bottom: -30px;
      color: rgba(255, 255, 255, 0.035);
      font-size: 8.5rem;
      font-weight: 900;
      letter-spacing: 6px;
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0;
      text-transform: uppercase;
      background: linear-gradient(92deg, #fff 8%, #ffc8fb 38%, var(--accent-3) 78%, #fff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 28px rgba(255, 63, 215, 0.26);
      animation: titleGlow 3s ease-in-out infinite;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    form > div {
      animation: fieldIn 0.65s ease both;
    }

    form > div:nth-child(1) { animation-delay: 0.08s; }
    form > div:nth-child(2) { animation-delay: 0.16s; }
    form > div:nth-child(3) { animation-delay: 0.24s; }
    form > div:nth-child(4) { animation-delay: 0.32s; }
    form > div:nth-child(5) { animation-delay: 0.4s; }

    label {
      font-size: 0.95rem;
      margin-bottom: 7px;
      display: block;
      color: #f1e9ff;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      background: rgba(8, 8, 15, 0.7);
      color: var(--text);
      font-size: 1rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: border-color 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease, background 0.22s ease;
    }

    input:focus {
      outline: none;
      border-color: rgba(69, 214, 255, 0.82);
      background: rgba(12, 13, 24, 0.88);
      box-shadow:
        0 0 0 3px rgba(69, 214, 255, 0.14),
        0 0 24px rgba(193, 59, 198, 0.28);
      transform: translateY(-1px);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 12px 20px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: linear-gradient(90deg, var(--accent), var(--hot), var(--accent-3));
      background-size: 220% 100%;
      color: #fff;
      font-weight: bold;
      font-size: 0.95rem;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 14px 34px rgba(193, 59, 198, 0.28);
      transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
      animation: buttonFlow 4s ease infinite;
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 0 34%, rgba(255, 255, 255, 0.34) 46%, transparent 58% 100%);
      transform: translateX(-120%);
      transition: transform 0.55s ease;
    }

    .btn:hover {
      filter: brightness(1.08);
      transform: translateY(-2px);
      box-shadow: 0 18px 42px rgba(69, 214, 255, 0.24), 0 12px 34px rgba(255, 63, 215, 0.22);
    }

    .btn:hover::before {
      transform: translateX(120%);
    }

    .btn:disabled {
      cursor: wait;
      opacity: 0.7;
      transform: none;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: #e7e7f2;
      box-shadow: none;
    }

    .status {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--error);
    }

    @keyframes gridDrift {
      from { background-position: 0 0, 0 0; }
      to { background-position: 58px 58px, 58px 58px; }
    }

    @keyframes speedLines {
      0%, 100% { opacity: 0.18; transform: translateX(-20%); }
      50% { opacity: 0.46; transform: translateX(10%); }
    }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(22px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cardShine {
      0%, 58%, 100% { transform: translateX(-48%); opacity: 0.45; }
      72% { transform: translateX(40%); opacity: 0.9; }
    }

    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(255, 63, 215, 0.2)); }
      50% { filter: drop-shadow(0 0 18px rgba(69, 214, 255, 0.32)); }
    }

    @keyframes fieldIn {
      from { transform: translateY(12px); }
      to { transform: translateY(0); }
    }

    @keyframes buttonFlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes roadRush {
      from { background-position: 0 0, 0 0; }
      to { background-position: -116px 0, 0 0; }
    }

    @keyframes horizonPulse {
      0%, 100% { opacity: 0.38; transform: scaleX(0.9); }
      50% { opacity: 0.9; transform: scaleX(1); }
    }

    @keyframes carLap {
      0% { transform: translateX(0) translateY(8px) scale(0.92); opacity: 0; }
      10% { opacity: 1; }
      48% { transform: translateX(calc(100vw + 260px)) translateY(-5px) scale(1.05); opacity: 1; }
      49% { opacity: 0; }
      62% { transform: translateX(calc(100vw + 260px)) translateY(10px) scale(0.82) rotateY(180deg); opacity: 0; }
      72% { opacity: 0.75; }
      100% { transform: translateX(-260px) translateY(4px) scale(0.82) rotateY(180deg); opacity: 0; }
    }

    @keyframes wheelSpin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 560px) {
      .container {
        padding: 34px 14px 44px;
      }

      .card {
        padding: 24px 18px;
        border-radius: 18px;
      }

      .actions,
      .btn {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="race-scene" aria-hidden="true">
    <div class="race-car">
      <span class="wheel back"></span>
      <span class="wheel front"></span>
    </div>
  </div>
  <main class="container">
    <div class="card">
      <h1>Entrylist pilote</h1>
      <p>
        Merci de remplir ce formulaire pour vous inscrire sur l’entrylist XMT.  
        Les données seront envoyées automatiquement dans la feuille Google Sheets.
      </p>

      <form id="entryForm">
        <div>
          <label for="gamertag">GamerTag</label>
          <input id="gamertag" name="gamertag" type="text" required />
        </div>

        <div>
          <label for="pseudo">Pseudo (affiché en jeu)</label>
          <input id="pseudo" name="pseudo" type="text" required />
        </div>

        <div>
          <label for="id">ID</label>
          <input id="id" name="id" type="text" required />
        </div>

        <div>
          <label for="numeroPilote">N° pilote</label>
          <input id="numeroPilote" name="numeroPilote" type="number" min="0" required />
        </div>

        <div class="actions">
          <button type="submit" class="btn">Envoyer mon entrylist</button>
          <a href="entrylist_liste.html" class="btn btn-secondary">Liste complète</a>
        </div>

        <div id="status" class="status"></div>
      </form>
    </div>
  </main>

  <script>
    // URL de ton Apps Script Web App (déploiement doPost)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxTILGoua3WpneTTlu1r06tE5_aJeJvfam6XYk4rSWklXsgnNYIpr8NFui87-AObu_3cg/exec";

    const form = document.getElementById("entryForm");
    const statusEl = document.getElementById("status");
    const submitButton = form.querySelector('button[type="submit"]');

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        gamertag: form.gamertag.value.trim(),
        pseudo: form.pseudo.value.trim(),
        id: form.id.value.trim(),
        numeroPilote: form.numeroPilote.value.trim()
      };

      if (!data.gamertag || !data.pseudo || !data.id || !data.numeroPilote) {
        statusEl.textContent = "Merci de remplir tous les champs.";
        statusEl.className = "status error";
        return;
      }

      statusEl.textContent = "Envoi en cours...";
      statusEl.className = "status";
      submitButton.disabled = true;

      const formData = new FormData();
      formData.append("action", "add");
      formData.append("gamertag", data.gamertag);
      formData.append("pseudo", data.pseudo);
      formData.append("id", data.id);
      formData.append("numeroPilote", data.numeroPilote);

      try {
        await fetch(WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          body: formData
        });

        statusEl.textContent = "Entrylist envoyé !";
        statusEl.className = "status success";

        form.reset();

      } catch (error) {
        console.error(error);
        statusEl.textContent = "Erreur lors de l'envoi. Merci de réessayer.";
        statusEl.className = "status error";
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
