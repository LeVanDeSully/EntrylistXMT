<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrylist XMT</title>
  <style>
    :root {
      --bg: #0b0b0f;
      --card: #14141b;
      --text: #f4f4f7;
      --muted: #b8b8c6;
      --accent: #8a0f8f;
      --accent-2: #c13bc6;
      --border: rgba(255, 255, 255, 0.1);
      --success: #8cffb1;
      --error: #ffb3b3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #181824 0%, var(--bg) 55%);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 20px 60px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(138, 15, 143, 0.2), rgba(255, 255, 255, 0.03));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      margin-bottom: 28px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .hero-text {
      max-width: 700px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1rem;
      max-width: 900px;
    }

    .hero-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #fff;
      font-weight: bold;
      font-size: 0.95rem;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn:hover {
      filter: brightness(1.05);
    }

    .btn-secondary {
      background: transparent;
      color: var(--muted);
    }

    .table-card {
      background: rgba(20, 20, 27, 0.92);
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .status {
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.02);
    }

    .status.error {
      color: var(--error);
    }

    .status.success {
      color: var(--success);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
    }

    thead {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    th, td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    td:last-child, th:last-child {
      text-align: center;
      width: 180px;
    }

    .number-col, th.number-col {
      text-align: center;
      width: 160px;
    }

    .points {
      display: inline-block;
      min-width: 54px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(138, 15, 143, 0.18);
      color: #f3c7f5;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .empty {
      color: #d9d9e3;
      opacity: 0.8;
      font-style: italic;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <div class="hero-text">
        <h1>Liste pilotes XMT</h1>
        <p>
          Vous pouvez retrouver ci-dessous la liste des pilotes ayant fait leur entrylist pour participer aux courses XMT.
        </p>
      </div>
      <div class="hero-actions">
        <a class="btn" href="entrylist_form.html">Faire son entrylist</a>
      </div>
    </section>

    <section class="table-card">
      <div id="status" class="status">Chargement de la liste depuis Google Sheets...</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pseudo</th>
              <th class="number-col">Numéro</th>
              <th>Points licence</th>
            </tr>
          </thead>
          <tbody id="pilotsTableBody">
            <tr>
              <td colspan="3" class="empty">Chargement des pilotes...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    // URL CSV publiée depuis Google Sheets (Fichier -> Publier sur le Web, format CSV)
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/17R6sZG_6msXugH3wUyLi_bWH0ukmXRikl0jOTFF1I0M/edit?usp=sharing";

    async function loadFromSheet() {
      const tbody = document.getElementById('pilotsTableBody');
      const status = document.getElementById('status');

      try {
        const response = await fetch(SHEET_CSV_URL + "&_=" + Date.now());

        if (!response.ok) {
          throw new Error("Impossible de récupérer le CSV Google Sheets");
        }

        const csvText = await response.text();

        const normalizedText = csvText
          .replace(/\r\n/g, "\n")
          .replace(/\r/g, "\n")
          .trim();

        const lines = normalizedText
          .split("\n")
          .map(line => line.trim())
          .filter(line => line.length > 0);

        if (lines.length < 2) {
          tbody.innerHTML = '<tr><td colspan="3" class="empty">Aucune donnée trouvée dans la feuille.</td></tr>';
          status.textContent = "Feuille chargée, mais vide.";
          status.className = "status";
          return;
        }

        const separator = lines[0].includes(";") ? ";" : ",";
        const headers = lines[0]
          .split(separator)
          .map(h => h.trim().replace(/^"|"$/g, "").toLowerCase());

        const pseudoIndex = headers.findIndex(h => h === "pseudo");
        const numeroIndex = headers.findIndex(h => h === "numero pilote" || h === "numéro pilote" || h === "numero");
        const pointsIndex = headers.findIndex(h => h === "points licence");

        if (pseudoIndex === -1 || numeroIndex === -1 || pointsIndex === -1) {
          throw new Error("Colonnes attendues dans la feuille : Pseudo, Numero pilote, Points licence");
        }

        const rows = lines.slice(1)
          .map(line => line.split(separator).map(cell => cell.trim().replace(/^"|"$/g, "")))
          .filter(cols => cols.some(cell => cell !== ""));

        if (rows.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" class="empty">Aucun pilote trouvé.</td></tr>';
          status.textContent = "Feuille chargée, mais aucune ligne exploitable.";
          status.className = "status";
          return;
        }

        tbody.innerHTML = "";

        rows.forEach(cols => {
          const pseudo = cols[pseudoIndex] || "—";
          const numero = cols[numeroIndex] || "—";
          const points = cols[pointsIndex] || "—";

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${escapeHtml(pseudo)}</td>
            <td class="number-col">${escapeHtml(numero)}</td>
            <td><span class="points">${escapeHtml(points)}</span></td>
          `;
          tbody.appendChild(tr);
        });

        status.textContent = rows.length + " pilote(s) chargé(s) depuis Google Sheets.";
        status.className = "status success";

      } catch (error) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">Impossible de charger les pilotes.</td></tr>';
        status.textContent = "Erreur : " + error.message;
        status.className = "status error";
        console.error(error);
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadFromSheet();
  </script>
</body>
</html>
