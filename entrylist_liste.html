<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrylist XMT</title>
  <style>
    :root {
      --bg: #0b0b0f;
      --card: #14141b;
      --text: #f4f4f7;
      --muted: #b8b8c6;
      --accent: #8a0f8f;
      --accent-2: #c13bc6;
      --accent-3: #45d6ff;
      --hot: #ff3fd7;
      --border: rgba(255, 255, 255, 0.1);
      --success: #8cffb1;
      --error: #ffb3b3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 63, 215, 0.22), transparent 27%),
        radial-gradient(circle at 82% 8%, rgba(69, 214, 255, 0.2), transparent 25%),
        radial-gradient(circle at 50% 100%, rgba(138, 15, 143, 0.28), transparent 34%),
        linear-gradient(135deg, #07070c 0%, #10091a 48%, #080912 100%);
      color: var(--text);
      isolation: isolate;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    body::before {
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 58px 58px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), transparent 82%);
      animation: gridDrift 18s linear infinite;
    }

    body::after {
      background:
        linear-gradient(115deg, transparent 0 36%, rgba(255, 255, 255, 0.1) 37%, transparent 39% 100%),
        linear-gradient(115deg, transparent 0 64%, rgba(69, 214, 255, 0.12) 65%, transparent 67% 100%);
      transform: translateX(-18%);
      animation: speedLines 7s ease-in-out infinite;
    }

    .race-scene {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: min(28vh, 220px);
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .race-scene::before {
      content: "";
      position: absolute;
      left: -5%;
      right: -5%;
      bottom: 38px;
      height: 72px;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.22) 0 56px, transparent 56px 116px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01));
      border-top: 1px solid rgba(69, 214, 255, 0.28);
      border-bottom: 1px solid rgba(255, 63, 215, 0.22);
      transform: perspective(360px) rotateX(58deg);
      transform-origin: bottom center;
      animation: roadRush 1.1s linear infinite;
    }

    .race-scene::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 98px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(69, 214, 255, 0.8), rgba(255, 63, 215, 0.7), transparent);
      box-shadow: 0 0 18px rgba(69, 214, 255, 0.45);
      animation: horizonPulse 2.4s ease-in-out infinite;
    }

    .race-car {
      position: absolute;
      left: -230px;
      bottom: 74px;
      width: 210px;
      height: 76px;
      filter: drop-shadow(0 0 18px rgba(255, 63, 215, 0.6));
      animation: carLap 7s cubic-bezier(.45, .02, .35, 1) infinite;
    }

    .race-car::before {
      content: "";
      position: absolute;
      left: 18px;
      right: 8px;
      bottom: 24px;
      height: 30px;
      background:
        linear-gradient(90deg, rgba(69, 214, 255, 0.95), rgba(255, 63, 215, 0.98) 58%, #ffffff 59% 63%, rgba(255, 63, 215, 0.95) 64%),
        linear-gradient(180deg, rgba(255,255,255,0.35), transparent);
      clip-path: polygon(0 72%, 8% 42%, 33% 36%, 45% 0, 68% 0, 82% 35%, 100% 50%, 95% 83%, 10% 88%);
      border-radius: 22px 34px 18px 18px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5), 0 0 24px rgba(69, 214, 255, 0.32);
    }

    .race-car::after {
      content: "";
      position: absolute;
      left: -120px;
      bottom: 36px;
      width: 138px;
      height: 14px;
      background: linear-gradient(90deg, transparent, rgba(69, 214, 255, 0.12), rgba(255, 63, 215, 0.8));
      filter: blur(2px);
      border-radius: 999px;
    }

    .wheel {
      position: absolute;
      bottom: 11px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background:
        radial-gradient(circle, #f8fbff 0 12%, #1b1b25 13% 36%, #050509 37% 100%);
      border: 3px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 12px rgba(69, 214, 255, 0.45);
      animation: wheelSpin 0.45s linear infinite;
    }

    .wheel.front { right: 28px; }
    .wheel.back { left: 34px; }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 64px 20px 72px;
      position: relative;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(26, 24, 38, 0.92), rgba(8, 9, 16, 0.86));
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      padding: 32px;
      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.48),
        0 0 44px rgba(193, 59, 198, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.13);
      margin-bottom: 28px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      backdrop-filter: blur(18px);
      animation: panelIn 0.8s cubic-bezier(.2, .8, .2, 1) both;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: -1px;
      background:
        linear-gradient(120deg, transparent 0 32%, rgba(255, 255, 255, 0.2) 45%, transparent 58% 100%),
        radial-gradient(circle at top left, rgba(255, 63, 215, 0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(69, 214, 255, 0.18), transparent 34%);
      opacity: 0.75;
      transform: translateX(-45%);
      animation: cardShine 5.5s ease-in-out infinite;
      pointer-events: none;
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    .hero-text {
      max-width: 700px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      letter-spacing: 0;
      text-transform: uppercase;
      background: linear-gradient(92deg, #fff 8%, #ffc8fb 38%, var(--accent-3) 78%, #fff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 28px rgba(255, 63, 215, 0.26);
      animation: titleGlow 3s ease-in-out infinite;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1rem;
      max-width: 900px;
    }

    .hero-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 12px 20px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: linear-gradient(90deg, var(--accent), var(--hot), var(--accent-3));
      background-size: 220% 100%;
      color: #fff;
      font-weight: bold;
      font-size: 0.95rem;
      text-decoration: none;
      white-space: nowrap;
      box-shadow: 0 14px 34px rgba(193, 59, 198, 0.28);
      transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
      animation: buttonFlow 4s ease infinite;
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 0 34%, rgba(255, 255, 255, 0.34) 46%, transparent 58% 100%);
      transform: translateX(-120%);
      transition: transform 0.55s ease;
    }

    .btn:hover {
      filter: brightness(1.08);
      transform: translateY(-2px);
      box-shadow: 0 18px 42px rgba(69, 214, 255, 0.24), 0 12px 34px rgba(255, 63, 215, 0.22);
    }

    .btn:hover::before {
      transform: translateX(120%);
    }

    .btn-secondary {
      background: transparent;
      color: var(--muted);
    }

    .table-card {
      background: linear-gradient(145deg, rgba(20, 20, 31, 0.92), rgba(8, 9, 16, 0.88));
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 72px rgba(0, 0, 0, 0.45), 0 0 35px rgba(69, 214, 255, 0.1);
      backdrop-filter: blur(18px);
      animation: panelIn 0.8s 0.12s cubic-bezier(.2, .8, .2, 1) both;
    }

    .status {
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.02);
    }

    .status.error {
      color: var(--error);
    }

    .status.success {
      color: var(--success);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
    }

    thead {
      background: linear-gradient(90deg, var(--accent), var(--hot), var(--accent-3));
      background-size: 220% 100%;
      animation: buttonFlow 5s ease infinite;
    }

    th, td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    tbody tr:hover {
      background: rgba(69, 214, 255, 0.07);
      box-shadow: inset 3px 0 0 rgba(255, 63, 215, 0.9);
    }

    td:last-child, th:last-child {
      text-align: center;
      width: 180px;
    }

    .number-col, th.number-col {
      text-align: center;
      width: 160px;
    }

    .points {
      display: inline-block;
      min-width: 54px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(138, 15, 143, 0.22);
      color: #f8d5ff;
      font-weight: bold;
      font-size: 0.9rem;
      box-shadow: 0 0 18px rgba(255, 63, 215, 0.16);
    }

    .empty {
      color: #d9d9e3;
      opacity: 0.8;
      font-style: italic;
      text-align: center;
    }

    @keyframes gridDrift {
      from { background-position: 0 0, 0 0; }
      to { background-position: 58px 58px, 58px 58px; }
    }

    @keyframes speedLines {
      0%, 100% { opacity: 0.18; transform: translateX(-20%); }
      50% { opacity: 0.46; transform: translateX(10%); }
    }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(22px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cardShine {
      0%, 58%, 100% { transform: translateX(-48%); opacity: 0.45; }
      72% { transform: translateX(40%); opacity: 0.9; }
    }

    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(255, 63, 215, 0.2)); }
      50% { filter: drop-shadow(0 0 18px rgba(69, 214, 255, 0.32)); }
    }

    @keyframes buttonFlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes roadRush {
      from { background-position: 0 0, 0 0; }
      to { background-position: -116px 0, 0 0; }
    }

    @keyframes horizonPulse {
      0%, 100% { opacity: 0.38; transform: scaleX(0.9); }
      50% { opacity: 0.9; transform: scaleX(1); }
    }

    @keyframes carLap {
      0% { transform: translateX(0) translateY(8px) scale(0.92); opacity: 0; }
      10% { opacity: 1; }
      48% { transform: translateX(calc(100vw + 260px)) translateY(-5px) scale(1.05); opacity: 1; }
      49% { opacity: 0; }
      62% { transform: translateX(calc(100vw + 260px)) translateY(10px) scale(0.82) rotateY(180deg); opacity: 0; }
      72% { opacity: 0.75; }
      100% { transform: translateX(-260px) translateY(4px) scale(0.82) rotateY(180deg); opacity: 0; }
    }

    @keyframes wheelSpin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 620px) {
      .container {
        padding: 34px 14px 44px;
      }

      .hero {
        border-radius: 18px;
        padding: 24px 18px;
      }

      .hero-actions,
      .btn {
        width: 100%;
      }

      th, td {
        padding: 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="race-scene" aria-hidden="true">
    <div class="race-car">
      <span class="wheel back"></span>
      <span class="wheel front"></span>
    </div>
  </div>
  <main class="container">
    <section class="hero">
      <div class="hero-text">
        <h1>Liste pilotes XMT</h1>
        <p>
          Vous pouvez retrouver ci-dessous la liste des pilotes ayant fait leur entrylist pour participer aux courses XMT.
        </p>
      </div>
      <div class="hero-actions">
        <a class="btn" href="entrylist_form.html">Faire son entrylist</a>
      </div>
    </section>

    <section class="table-card">
      <div id="status" class="status">Chargement de la liste depuis Google Sheets...</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pseudo</th>
              <th class="number-col">Numéro</th>
              <th>Points licence</th>
            </tr>
          </thead>
          <tbody id="pilotsTableBody">
            <tr>
              <td colspan="3" class="empty">Chargement des pilotes...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    // URL CSV publiée depuis Google Sheets (Fichier -> Publier sur le Web, format CSV)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxTILGoua3WpneTTlu1r06tE5_aJeJvfam6XYk4rSWklXsgnNYIpr8NFui87-AObu_3cg/exec";

    async function loadFromSheetOld() {
      const tbody = document.getElementById('pilotsTableBody');
      const status = document.getElementById('status');

      try {
        const response = await fetch(SHEET_CSV_URL + "&_=" + Date.now());

        if (!response.ok) {
          throw new Error("Impossible de récupérer le CSV Google Sheets");
        }

        const csvText = await response.text();

        const normalizedText = csvText
          .replace(/\r\n/g, "\n")
          .replace(/\r/g, "\n")
          .trim();

        const lines = normalizedText
          .split("\n")
          .map(line => line.trim())
          .filter(line => line.length > 0);

        if (lines.length < 2) {
          tbody.innerHTML = '<tr><td colspan="3" class="empty">Aucune donnée trouvée dans la feuille.</td></tr>';
          status.textContent = "Feuille chargée, mais vide.";
          status.className = "status";
          return;
        }

        const separator = lines[0].includes(";") ? ";" : ",";
        const headers = lines[0]
          .split(separator)
          .map(h => h.trim().replace(/^"|"$/g, "").toLowerCase());

        const pseudoIndex = headers.findIndex(h => h === "pseudo");
        const numeroIndex = headers.findIndex(h => h === "numero pilote" || h === "numéro pilote" || h === "numero");
        const pointsIndex = headers.findIndex(h => h === "points licence");

        if (pseudoIndex === -1 || numeroIndex === -1 || pointsIndex === -1) {
          throw new Error("Colonnes attendues dans la feuille : Pseudo, Numero pilote, Points licence");
        }

        const rows = lines.slice(1)
          .map(line => line.split(separator).map(cell => cell.trim().replace(/^"|"$/g, "")))
          .filter(cols => cols.some(cell => cell !== ""));

        if (rows.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" class="empty">Aucun pilote trouvé.</td></tr>';
          status.textContent = "Feuille chargée, mais aucune ligne exploitable.";
          status.className = "status";
          return;
        }

        tbody.innerHTML = "";

        rows.forEach(cols => {
          const pseudo = cols[pseudoIndex] || "—";
          const numero = cols[numeroIndex] || "—";
          const points = cols[pointsIndex] || "—";

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${escapeHtml(pseudo)}</td>
            <td class="number-col">${escapeHtml(numero)}</td>
            <td><span class="points">${escapeHtml(points)}</span></td>
          `;
          tbody.appendChild(tr);
        });

        status.textContent = rows.length + " pilote(s) chargé(s) depuis Google Sheets.";
        status.className = "status success";

      } catch (error) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">Impossible de charger les pilotes.</td></tr>';
        status.textContent = "Erreur : " + error.message;
        status.className = "status error";
        console.error(error);
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function loadFromSheet() {
      const tbody = document.getElementById("pilotsTableBody");
      const status = document.getElementById("status");

      try {
        const payload = await loadAppsScriptData();
        const pilots = normalizePilots(payload);

        if (pilots.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" class="empty">Aucun pilote trouve.</td></tr>';
          status.textContent = "Apps Script charge, mais aucune ligne exploitable n'a ete renvoyee.";
          status.className = "status";
          return;
        }

        tbody.innerHTML = "";

        pilots.forEach((pilot) => {
          const tr = document.createElement("tr");
          const pseudoCell = document.createElement("td");
          const numeroCell = document.createElement("td");
          const pointsCell = document.createElement("td");
          const pointsBadge = document.createElement("span");

          numeroCell.className = "number-col";
          pointsBadge.className = "points";

          pseudoCell.textContent = pilot.pseudo || "-";
          numeroCell.textContent = pilot.numero || "-";
          pointsBadge.textContent = pilot.points || "0";

          pointsCell.appendChild(pointsBadge);
          tr.appendChild(pseudoCell);
          tr.appendChild(numeroCell);
          tr.appendChild(pointsCell);
          tbody.appendChild(tr);
        });

        status.textContent = pilots.length + " pilote(s) charge(s) depuis Google Sheets.";
        status.className = "status success";
      } catch (error) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">Impossible de charger les pilotes.</td></tr>';
        status.textContent = "Erreur : " + error.message;
        status.className = "status error";
        console.error(error);
      }
    }

    async function loadAppsScriptData() {
      const url = WEB_APP_URL + "?action=list&_=" + Date.now();

      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error("Reponse Apps Script invalide");
        }
        return parseAppsScriptText(await response.text());
      } catch (error) {
        return loadAppsScriptJsonp();
      }
    }

    function loadAppsScriptJsonp() {
      return new Promise((resolve, reject) => {
        const callbackName = "__entrylistCallback_" + Date.now();
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("L'Apps Script doit renvoyer du JSON ou supporter le parametre callback pour la liste."));
        }, 8000);

        window[callbackName] = (payload) => {
          cleanup();
          resolve(payload);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("Impossible de charger les donnees Apps Script."));
        };

        script.src = WEB_APP_URL + "?action=list&callback=" + callbackName + "&_=" + Date.now();
        document.body.appendChild(script);

        function cleanup() {
          window.clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        }
      });
    }

    function parseAppsScriptText(text) {
      const trimmed = text.trim();
      const jsonpMatch = trimmed.match(/^[^(]+\(([\s\S]*)\);?$/);
      return JSON.parse(jsonpMatch ? jsonpMatch[1] : trimmed);
    }

    function normalizePilots(payload) {
      const source = Array.isArray(payload)
        ? payload
        : payload && (payload.data || payload.rows || payload.entries || payload.pilotes || payload.pilots || payload.values);

      if (!Array.isArray(source)) {
        return [];
      }

      if (source.length > 0 && Array.isArray(source[0])) {
        return normalizeArrayRows(source);
      }

      return source
        .filter((row) => row && typeof row === "object")
        .map((row) => ({
          pseudo: pickValue(row, ["pseudo", "nom", "pilote", "joueur", "name"]),
          numero: pickValue(row, ["numeroPilote", "numero pilote", "numero", "num", "n", "number"]),
          points: pickValue(row, ["pointsLicence", "points licence", "points", "licence"])
        }))
        .filter((pilot) => pilot.pseudo || pilot.numero || pilot.points);
    }

    function normalizeArrayRows(rows) {
      const firstRow = rows[0].map(String);
      const headerMap = firstRow.map(normalizeKey);
      const hasHeaders = headerMap.some((key) => ["pseudo", "numeropilote", "numero", "pointslicence"].includes(key));
      const dataRows = hasHeaders ? rows.slice(1) : rows;

      return dataRows
        .filter((row) => Array.isArray(row) && row.some((cell) => String(cell || "").trim() !== ""))
        .map((row) => {
          if (hasHeaders) {
            return {
              pseudo: row[findHeader(headerMap, ["pseudo", "nom", "pilote", "joueur", "name"])] || "",
              numero: row[findHeader(headerMap, ["numeropilote", "numero", "num", "n", "number"])] || "",
              points: row[findHeader(headerMap, ["pointslicence", "points", "licence"])] || ""
            };
          }

          return {
            pseudo: row[2] || row[1] || "",
            numero: row[4] || row[3] || "",
            points: row[5] || "0"
          };
        })
        .filter((pilot) => pilot.pseudo || pilot.numero || pilot.points);
    }

    function pickValue(row, names) {
      const normalizedNames = names.map(normalizeKey);
      const key = Object.keys(row).find((item) => normalizedNames.includes(normalizeKey(item)));
      return key ? row[key] : "";
    }

    function findHeader(headers, names) {
      const normalizedNames = names.map(normalizeKey);
      return headers.findIndex((header) => normalizedNames.includes(header));
    }

    function normalizeKey(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]/g, "");
    }

    loadFromSheet();
  </script>
</body>
