<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrylist XMT – Liste Pilotes</title>
  <link rel="icon" type="image/png" href="xmt-logo.png" />
  <style>
    :root {
      --bg: #0b0b0f;
      --text: #f4f4f7;
      --muted: #b8b8c6;
      --accent: #8a0f8f;
      --accent-2: #c13bc6;
      --accent-3: #45d6ff;
      --hot: #ff3fd7;
      --border: rgba(255,255,255,0.1);
      --success: #8cffb1;
      --error: #ffb3b3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        linear-gradient(90deg, rgba(3,4,8,0.88), rgba(8,8,14,0.55) 44%, rgba(4,5,9,0.92)),
        linear-gradient(180deg, rgba(0,0,0,0.5), rgba(0,0,0,0.78)),
        url("xmt-gt3-showroom.png") center center / cover fixed no-repeat,
        #07070c;
      color: var(--text);
      isolation: isolate;
    }

    /* ══ GRID OVERLAY ══ */
    body::before {
      content: "";
      position: fixed; inset: 0; pointer-events: none; z-index: -1;
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent 88%);
      animation: gridDrift 20s linear infinite;
    }

    /* ══ SPEED LINES ══ */
    body::after {
      content: "";
      position: fixed; inset: 0; pointer-events: none; z-index: -1;
      background:
        linear-gradient(108deg, transparent 0 28%, rgba(255,255,255,0.06) 30%, transparent 32% 100%),
        linear-gradient(108deg, transparent 0 55%, rgba(69,214,255,0.08) 57%, transparent 59% 100%),
        linear-gradient(108deg, transparent 0 72%, rgba(255,63,215,0.05) 74%, transparent 76% 100%);
      animation: speedLines 5s ease-in-out infinite;
    }

    /* ══ SHOWROOM BG ══ */
    .showroom-bg {
      position: fixed; inset: -4%; z-index: -3; pointer-events: none;
      background: url("xmt-gt3-showroom.png") center center / cover no-repeat;
      filter: saturate(1.1) contrast(1.05) brightness(0.85);
      animation: showroomMove 22s ease-in-out infinite alternate;
    }

    /* ══ PARTICLES ══ */
    .particles {
      position: fixed; inset: 0; pointer-events: none; z-index: -1; overflow: hidden;
    }

    .particle {
      position: absolute;
      bottom: -10px;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--accent-3);
      box-shadow: 0 0 6px var(--accent-3);
      animation: particleRise var(--dur, 6s) linear var(--delay, 0s) infinite;
      left: var(--x, 50%);
      opacity: 0;
    }

    .particle:nth-child(odd)  { background: var(--hot); box-shadow: 0 0 6px var(--hot); }
    .particle:nth-child(3n)   { width: 2px; height: 2px; }
    .particle:nth-child(4n)   { width: 4px; height: 4px; background: #fff; box-shadow: 0 0 8px #fff; }

    /* ══ BACKGROUND RACING CAR (grand, fond) ══ */
    .bg-car-layer {
      position: fixed;
      bottom: 120px;
      left: -420px;
      width: 400px;
      pointer-events: none;
      z-index: -1;
      opacity: 0.28;
      filter: blur(0.5px) drop-shadow(0 0 20px rgba(255,63,215,0.6));
      animation: bgCarDrive 18s linear infinite;
    }

    /* ══ ROAD + FOREGROUND CAR ══ */
    .race-scene {
      position: fixed; left: 0; right: 0; bottom: 0;
      height: min(26vh, 210px); pointer-events: none; overflow: hidden; z-index: 10;
    }

    .road {
      position: absolute; left: -5%; right: -5%; bottom: 30px; height: 65px;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.18) 0 52px, transparent 52px 108px),
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.01));
      border-top: 1px solid rgba(69,214,255,0.25);
      border-bottom: 1px solid rgba(255,63,215,0.2);
      transform: perspective(340px) rotateX(56deg);
      transform-origin: bottom center;
      animation: roadRush 0.9s linear infinite;
    }

    .road-glow {
      position: absolute; left: 0; right: 0; bottom: 88px; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(69,214,255,0.9), rgba(255,63,215,0.8), transparent);
      box-shadow: 0 0 22px rgba(69,214,255,0.5), 0 0 44px rgba(255,63,215,0.3);
      animation: horizonPulse 2s ease-in-out infinite;
    }

    /* Voiture principale CSS */
    .race-car {
      position: absolute; left: -260px; bottom: 66px;
      width: 240px; height: 82px;
      filter: drop-shadow(0 0 22px rgba(255,63,215,0.7)) drop-shadow(0 4px 8px rgba(0,0,0,0.8));
      animation: carLap 6s cubic-bezier(.4,.02,.3,1) infinite;
    }

    .car-body {
      position: absolute; left: 20px; right: 10px; bottom: 26px; height: 36px;
      background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 30%),
        linear-gradient(90deg, rgba(69,214,255,0.9), rgba(255,63,215,0.95) 55%, #fff 56% 61%, rgba(255,63,215,0.9) 62%);
      clip-path: polygon(0 78%, 7% 44%, 28% 36%, 38% 2%, 62% 2%, 78% 34%, 100% 52%, 96% 86%, 8% 92%);
      border-radius: 20px 32px 16px 16px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.55), 0 0 28px rgba(69,214,255,0.35);
    }

    .car-stripe {
      position: absolute; left: 95px; right: 95px; bottom: 26px; height: 36px;
      background: rgba(255,255,255,0.9);
      clip-path: polygon(30% 10%, 70% 10%, 65% 90%, 35% 90%);
    }

    .car-spoiler {
      position: absolute; right: 8px; bottom: 52px;
      width: 28px; height: 5px;
      background: rgba(255,63,215,0.9);
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(255,63,215,0.8);
    }

    .car-spoiler::after {
      content: "";
      position: absolute; right: 4px; top: 4px;
      width: 3px; height: 12px;
      background: rgba(200,200,200,0.7);
    }

    .exhaust-glow {
      position: absolute; right: -18px; bottom: 38px;
      width: 22px; height: 8px;
      background: radial-gradient(ellipse at right, rgba(255,130,0,0.9), transparent);
      filter: blur(2px);
      animation: exhaustPulse 0.12s ease-in-out infinite alternate;
    }

    .car-trail {
      position: absolute; right: 100%; bottom: 42px;
      width: 140px; height: 12px;
      background: linear-gradient(90deg, transparent, rgba(69,214,255,0.08), rgba(255,63,215,0.55));
      filter: blur(3px); border-radius: 999px;
    }

    .wheel {
      position: absolute; bottom: 12px;
      width: 36px; height: 36px;
      border-radius: 50%;
      background:
        radial-gradient(circle, #fafbff 0 11%, #1c1c28 12% 36%, #060609 37% 100%);
      border: 3px solid rgba(255,255,255,0.18);
      box-shadow: 0 0 14px rgba(69,214,255,0.5);
      animation: wheelSpin 0.35s linear infinite;
    }
    .wheel.front { right: 30px; }
    .wheel.back  { left: 36px; }

    /* ══ LAYOUT ══ */
    .container {
      max-width: 1100px; margin: 0 auto;
      padding: 44px 20px 100px;
      position: relative; z-index: 1;
    }

    /* ══ HERO ══ */
    .hero {
      position: relative; overflow: hidden;
      background: linear-gradient(145deg, rgba(22,20,34,0.94), rgba(6,7,14,0.9));
      border: 1px solid rgba(255,255,255,0.14); border-radius: 24px;
      padding: 26px 30px; margin-bottom: 18px;
      display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 16px;
      backdrop-filter: blur(20px);
      box-shadow: 0 28px 80px rgba(0,0,0,0.55), 0 0 50px rgba(193,59,198,0.15), inset 0 1px 0 rgba(255,255,255,0.12);
      animation: panelIn 0.9s cubic-bezier(.2,.8,.2,1) both;
    }

    .hero::before {
      content: ""; position: absolute; inset: -1px;
      background:
        linear-gradient(120deg, transparent 0 30%, rgba(255,255,255,0.18) 43%, transparent 56% 100%),
        radial-gradient(circle at top left, rgba(255,63,215,0.2), transparent 30%),
        radial-gradient(circle at bottom right, rgba(69,214,255,0.15), transparent 32%);
      opacity: 0.8; transform: translateX(-45%);
      animation: cardShine 6s ease-in-out infinite; pointer-events: none;
    }

    /* Checkered flag accent */
    .hero::after {
      content: "";
      position: absolute; top: 0; right: 0;
      width: 120px; height: 100%;
      background: repeating-conic-gradient(rgba(255,255,255,0.04) 0% 25%, transparent 0% 50%) 0 0 / 14px 14px;
      mask-image: linear-gradient(to left, rgba(0,0,0,0.6), transparent);
      pointer-events: none;
    }

    .hero > * { position: relative; z-index: 1; }

    .hero-logo {
      height: 60px; width: auto;
      mix-blend-mode: screen;
      filter: drop-shadow(0 0 14px rgba(193,59,198,0.5));
      flex-shrink: 0;
      transition: filter 0.3s;
    }
    .hero-logo:hover { filter: drop-shadow(0 0 22px rgba(69,214,255,0.7)); }

    .hero-text { flex: 1; min-width: 180px; }

    h1 {
      font-size: clamp(1.5rem, 3.2vw, 2.6rem);
      text-transform: uppercase;
      background: linear-gradient(92deg, #fff 5%, #ffc8fb 36%, var(--accent-3) 76%, #fff 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: titleGlow 3s ease-in-out infinite;
      line-height: 1.1; margin-bottom: 4px;
    }

    .hero-sub { color: var(--muted); font-size: 0.85rem; }

    .hero-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      padding: 11px 22px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: linear-gradient(90deg, var(--accent), var(--hot), var(--accent-3));
      background-size: 220% 100%;
      color: #fff; font-weight: bold; font-size: 0.9rem; text-decoration: none;
      white-space: nowrap; min-height: 44px;
      box-shadow: 0 10px 28px rgba(193,59,198,0.28);
      transition: transform 0.22s, box-shadow 0.22s, filter 0.22s;
      animation: buttonFlow 4s ease infinite;
    }
    .btn::before {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(115deg, transparent 0 34%, rgba(255,255,255,0.32) 46%, transparent 58% 100%);
      transform: translateX(-120%); transition: transform 0.5s;
    }
    .btn:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 16px 38px rgba(69,214,255,0.22), 0 10px 28px rgba(255,63,215,0.2); }
    .btn:hover::before { transform: translateX(120%); }

    /* ══ STATUS BAR ══ */
    .status-bar {
      padding: 7px 18px; font-size: 0.82rem; color: var(--muted);
      border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02);
      min-height: 34px; display: flex; align-items: center; gap: 8px;
    }
    .status-bar.error { color: var(--error); }

    /* ══ TABLE CARD ══ */
    .table-card {
      background: linear-gradient(145deg, rgba(18,17,28,0.94), rgba(6,7,14,0.92));
      border: 1px solid rgba(255,255,255,0.12); border-radius: 22px; overflow: hidden;
      box-shadow: 0 24px 72px rgba(0,0,0,0.5), 0 0 40px rgba(69,214,255,0.08), inset 0 1px 0 rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      animation: panelIn 0.9s 0.14s cubic-bezier(.2,.8,.2,1) both;
    }

    /* ══ TABLE ══ */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; min-width: 380px; }

    thead tr {
      background: linear-gradient(90deg, rgba(138,15,143,0.9), rgba(255,63,215,0.75), rgba(69,214,255,0.7));
      background-size: 220% 100%;
      animation: buttonFlow 6s ease infinite;
    }

    th {
      padding: 12px 18px; text-align: left;
      font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700;
    }

    th.num-col { text-align: center; width: 110px; }
    th.pts-col { width: 150px; }

    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.18s, box-shadow 0.18s;
      animation: rowSlideIn 0.5s ease both;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:nth-child(even) { background: rgba(255,255,255,0.018); }

    tbody tr:hover {
      background: rgba(69,214,255,0.06);
      box-shadow: inset 4px 0 0 var(--hot), inset -1px 0 0 rgba(255,63,215,0.15);
    }

    td { padding: 11px 18px; font-size: 0.93rem; }
    td.num-col { text-align: center; }

    /* Pseudo with avatar initial */
    .pseudo-cell { display: flex; align-items: center; gap: 12px; }

    .avatar {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 0.75rem; text-transform: uppercase;
      background: linear-gradient(135deg, rgba(138,15,143,0.4), rgba(69,214,255,0.2));
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
    }

    .pseudo-name { font-weight: 600; }

    /* Numero badge */
    .num-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 40px; height: 30px; padding: 0 10px;
      border-radius: 8px;
      background: rgba(69,214,255,0.1); border: 1px solid rgba(69,214,255,0.3);
      color: var(--accent-3); font-weight: 900; font-size: 1rem;
      box-shadow: 0 0 12px rgba(69,214,255,0.15);
      transition: box-shadow 0.2s;
    }

    tbody tr:hover .num-badge {
      box-shadow: 0 0 20px rgba(69,214,255,0.4);
    }

    /* Points badge */
    .pts-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 999px;
      background: rgba(138,15,143,0.2); border: 1px solid rgba(193,59,198,0.3);
      color: #f8d5ff; font-weight: 700; font-size: 0.85rem;
      box-shadow: 0 0 12px rgba(255,63,215,0.12);
    }

    .pts-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--hot); box-shadow: 0 0 6px var(--hot);
      animation: dotPulse 1.8s ease-in-out infinite;
    }

    .empty {
      text-align: center; padding: 40px !important;
      color: var(--muted); font-style: italic;
    }

    /* ══ MOBILE CARDS ══ */
    .pilot-cards { display: none; }

    .pilot-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      animation: rowSlideIn 0.5s ease both;
    }
    .pilot-card:last-child { border-bottom: none; }
    .pilot-card:hover { background: rgba(69,214,255,0.05); }

    .card-num {
      min-width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 1.05rem; color: var(--accent-3);
      background: rgba(69,214,255,0.1); border: 1px solid rgba(69,214,255,0.3);
      box-shadow: 0 0 12px rgba(69,214,255,0.15);
    }

    .card-info { flex: 1; min-width: 0; }
    .card-pseudo { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-pts { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    /* ══ KEYFRAMES ══ */
    @keyframes gridDrift { to { background-position: 52px 52px, 52px 52px; } }

    @keyframes speedLines {
      0%, 100% { opacity: 1; transform: translateX(0); }
      50% { opacity: 0.5; transform: translateX(3%); }
    }

    @keyframes showroomMove {
      from { transform: scale(1.02) translate3d(-1%, -0.5%, 0); }
      to   { transform: scale(1.07) translate3d(1%, 0.8%, 0); }
    }

    @keyframes particleRise {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: 0.8; }
      80%  { opacity: 0.4; }
      100% { transform: translateY(-80vh) translateX(var(--drift, 40px)); opacity: 0; }
    }

    @keyframes bgCarDrive {
      0%   { left: -420px; opacity: 0; }
      5%   { opacity: 0.12; }
      90%  { opacity: 0.12; }
      100% { left: calc(100vw + 50px); opacity: 0; }
    }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cardShine {
      0%, 60%, 100% { transform: translateX(-50%); opacity: 0.4; }
      74% { transform: translateX(42%); opacity: 0.85; }
    }

    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(255,63,215,0.2)); }
      50%       { filter: drop-shadow(0 0 16px rgba(69,214,255,0.35)); }
    }

    @keyframes buttonFlow {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }

    @keyframes roadRush {
      to { background-position: -108px 0, 0 0; }
    }

    @keyframes horizonPulse {
      0%, 100% { opacity: 0.35; transform: scaleX(0.88); }
      50%       { opacity: 1; transform: scaleX(1); }
    }

    @keyframes carLap {
      0%   { transform: translateX(0) translateY(6px) scale(.9); opacity: 0; }
      8%   { opacity: 1; }
      46%  { transform: translateX(calc(100vw + 280px)) translateY(-4px) scale(1.06); opacity: 1; }
      47%  { opacity: 0; }
      60%  { transform: translateX(calc(100vw + 280px)) translateY(8px) scale(.82) rotateY(180deg); opacity: 0; }
      70%  { opacity: 0.7; }
      100% { transform: translateX(-280px) translateY(3px) scale(.82) rotateY(180deg); opacity: 0; }
    }

    @keyframes wheelSpin { to { transform: rotate(360deg); } }

    @keyframes exhaustPulse {
      from { opacity: 0.6; transform: scaleX(1); }
      to   { opacity: 1; transform: scaleX(1.4); }
    }

    @keyframes rowSlideIn {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 680px) {
      .container { padding: 16px 10px 100px; }
      .hero { padding: 16px; border-radius: 16px; gap: 10px; }
      .hero-logo { height: 40px; }
      h1 { font-size: 1.3rem; }
      .hero-sub { display: none; }
      .table-wrap { display: none; }
      .pilot-cards { display: block; }
      .race-scene { height: min(18vh, 130px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
    }
  </style>
</head>
<body>
  <div class="showroom-bg"></div>

  <!-- Particules flottantes -->
  <div class="particles" id="particlesContainer"></div>

  <!-- Voiture de fond (grande, transparente) -->
  <div class="bg-car-layer">
    <svg viewBox="0 0 340 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="170" cy="84" rx="140" ry="7" fill="rgba(0,0,0,0.35)"/>
      <path d="M18 62 L28 36 Q42 16 80 13 L170 10 Q215 8 242 16 L268 28 Q282 38 286 62 Z" fill="rgba(138,15,143,0.85)"/>
      <path d="M85 13 Q130 4 175 4 Q210 5 228 13 L220 28 Q192 20 162 20 Q128 20 105 25 Z" fill="rgba(69,214,255,0.4)"/>
      <path d="M135 10 L160 10 L164 62 L140 62 Z" fill="rgba(255,63,215,0.35)"/>
      <rect x="272" y="22" width="44" height="6" rx="3" fill="rgba(138,15,143,0.95)"/>
      <rect x="284" y="28" width="4" height="16" fill="rgba(220,220,220,0.6)"/>
      <rect x="300" y="28" width="4" height="16" fill="rgba(220,220,220,0.6)"/>
      <path d="M12 60 L42 60 L36 72 L6 72 Z" fill="rgba(138,15,143,0.7)"/>
      <circle cx="78" cy="70" r="20" fill="#080810"/>
      <circle cx="78" cy="70" r="13" fill="#111" stroke="rgba(69,214,255,0.6)" stroke-width="2"/>
      <circle cx="78" cy="70" r="6" fill="#1a1a25"/>
      <circle cx="240" cy="70" r="22" fill="#080810"/>
      <circle cx="240" cy="70" r="14" fill="#111" stroke="rgba(255,63,215,0.6)" stroke-width="2"/>
      <circle cx="240" cy="70" r="6" fill="#1a1a25"/>
      <ellipse cx="315" cy="56" rx="10" ry="5" fill="rgba(255,110,0,0.5)"/>
    </svg>
  </div>

  <!-- Route + voiture foreground -->
  <div class="race-scene">
    <div class="road"></div>
    <div class="road-glow"></div>
    <div class="race-car">
      <div class="car-trail"></div>
      <div class="exhaust-glow"></div>
      <div class="car-spoiler"></div>
      <div class="car-body"></div>
      <div class="car-stripe"></div>
      <div class="wheel back"></div>
      <div class="wheel front"></div>
    </div>
  </div>

  <main class="container">
    <section class="hero">
      <img class="hero-logo" src="xmt-logo.png" alt="XMT" />
      <div class="hero-text">
        <h1>Liste Pilotes</h1>
        <p class="hero-sub">Pilotes inscrits sur l'entrylist XMT pour les courses du serveur.</p>
      </div>
      <div class="hero-actions">
        <a class="btn" href="entrylist_form.html">Faire son entrylist</a>
      </div>
    </section>

    <section class="table-card">
      <div class="status-bar" id="statusBar">Chargement des pilotes...</div>

      <!-- PC -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pseudo</th>
              <th class="num-col">Numéro</th>
              <th class="pts-col">Points Licence</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="3" class="empty">Chargement...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Mobile -->
      <div class="pilot-cards" id="cardList">
        <div style="padding:28px;text-align:center;color:var(--muted);font-style:italic">Chargement...</div>
      </div>
    </section>
  </main>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxTILGoua3WpneTTlu1r06tE5_aJeJvfam6XYk4rSWklXsgnNYIpr8NFui87-AObu_3cg/exec";

    // ── Particules ──
    (function spawnParticles() {
      const container = document.getElementById("particlesContainer");
      const positions = [4,9,15,22,28,35,42,48,55,61,68,74,80,87,93];
      positions.forEach((x, i) => {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.setProperty("--x", x + "%");
        p.style.setProperty("--dur", (5 + Math.random() * 7) + "s");
        p.style.setProperty("--delay", (Math.random() * 8) + "s");
        p.style.setProperty("--drift", (Math.random() * 80 - 40) + "px");
        container.appendChild(p);
      });
    })();

    // ── Data ──
    const tableBody = document.getElementById("tableBody");
    const cardList  = document.getElementById("cardList");
    const statusBar = document.getElementById("statusBar");

    async function loadPilots() {
      try {
        const payload = await fetchData();
        const pilots  = normalizePilots(payload);

        if (pilots.length === 0) {
          tableBody.innerHTML = '<tr><td colspan="3" class="empty">Aucun pilote inscrit pour le moment.</td></tr>';
          cardList.innerHTML  = '<div style="padding:28px;text-align:center;color:var(--muted);font-style:italic">Aucun pilote inscrit.</div>';
          statusBar.textContent = "Aucune donnée.";
          return;
        }

        // PC Table
        tableBody.innerHTML = "";
        pilots.forEach((p, i) => {
          const tr = document.createElement("tr");
          tr.style.animationDelay = (i * 0.045) + "s";
          tr.innerHTML = `
            <td>${esc(p.pseudo)}</td>
            <td class="num-col"><span class="num-badge">${esc(p.numero)}</span></td>
            <td><span class="pts-badge"><span class="pts-dot"></span>${esc(p.points)}</span></td>`;
          tableBody.appendChild(tr);
        });

        // Mobile cards
        cardList.innerHTML = "";
        pilots.forEach((p, i) => {
          const div = document.createElement("div");
          div.className = "pilot-card";
          div.style.animationDelay = (i * 0.045) + "s";
          div.innerHTML = `
            <div class="card-num">${esc(p.numero)}</div>
            <div class="card-info">
              <div class="card-pseudo">${esc(p.pseudo)}</div>
              <div class="card-pts">${esc(p.points)} pts licence</div>
            </div>`;
          cardList.appendChild(div);
        });

        statusBar.textContent = "";
        statusBar.className = "status-bar";

      } catch (err) {
        tableBody.innerHTML = '<tr><td colspan="3" class="empty">Impossible de charger la liste.</td></tr>';
        cardList.innerHTML  = '<div style="padding:28px;text-align:center;color:var(--error)">Impossible de charger la liste.</div>';
        statusBar.textContent = "Erreur : " + err.message;
        statusBar.className = "status-bar error";
      }
    }

    async function fetchData() {
      const url = WEB_APP_URL + "?action=list&_=" + Date.now();
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error();
        const text = await res.text();
        return JSON.parse(text.trim().replace(/^[^(]+\(([\s\S]*)\);?$/, "$1"));
      } catch (_) { return fetchJsonp(); }
    }

    function fetchJsonp() {
      return new Promise((resolve, reject) => {
        const cb = "__xmt_" + Date.now();
        const script = document.createElement("script");
        const timer = setTimeout(() => { cleanup(); reject(new Error("Timeout")); }, 9000);
        window[cb] = d => { cleanup(); resolve(d); };
        script.onerror = () => { cleanup(); reject(new Error("Échec réseau")); };
        script.src = WEB_APP_URL + "?action=list&callback=" + cb + "&_=" + Date.now();
        document.body.appendChild(script);
        function cleanup() { clearTimeout(timer); delete window[cb]; script.remove(); }
      });
    }

    function normalizePilots(payload) {
      const source = Array.isArray(payload?.rows)    ? payload.rows
                   : Array.isArray(payload?.data)    ? payload.data
                   : Array.isArray(payload)           ? payload
                   : null;
      if (!source) return [];

      let pilots;
      if (source.length > 0 && Array.isArray(source[0])) {
        const h = source[0].map(nk);
        const hasH = h.some(k => ["pseudo","numeropilote"].includes(k));
        pilots = (hasH ? source.slice(1) : source)
          .filter(r => r.some(c => String(c||"").trim()))
          .map(r => hasH
            ? { pseudo: r[fi(h,["pseudo","nom"])]||"", numero: r[fi(h,["numeropilote","numero","num"])]||"", points: r[fi(h,["pointslicence","points"])]||"10" }
            : { pseudo: r[1]||"", numero: r[3]||"", points: r[4]||"10" }
          );
      } else {
        pilots = source
          .filter(r => r && typeof r === "object")
          .map(r => ({
            pseudo:  pv(r,["pseudo","nom","pilote","name"]),
            numero:  pv(r,["numeroPilote","numero","num","n","number"]),
            points:  pv(r,["pointsLicence","points","licence"]) || "10"
          }));
      }

      return pilots
        .filter(p => p.pseudo || p.numero)
        .sort((a, b) => parseInt(a.numero)||0 - (parseInt(b.numero)||0));
    }

    function pv(obj, keys) {
      const k = Object.keys(obj).find(k => keys.map(nk).includes(nk(k)));
      return k ? String(obj[k]||"") : "";
    }
    function fi(arr, names) { return arr.findIndex(h => names.map(nk).includes(h)); }
    function nk(v) { return String(v||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]/g,""); }
    function esc(v) { return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

    loadPilots();
  </script>
</body>
</html>
